<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login - Bullion Dealer Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Orbitron:wght@700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#FFD700;--bg:#08080F;--bg2:#10101A;--bg3:#181828;--border:#252545;--text:#F2F2FF;--muted:#5A5A88;--green:#00FF88;--red:#FF4455}
body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.logo{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;background:linear-gradient(90deg,var(--gold),#90B8E8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px;margin-bottom:32px;text-align:center}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:36px;width:100%;max-width:400px}
h2{font-family:'Orbitron',monospace;font-size:16px;letter-spacing:2px;color:var(--gold);margin-bottom:24px;text-align:center}
label{display:block;font-size:12px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:5px}
input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:16px;margin-bottom:18px;outline:none;-webkit-appearance:none}
input:focus{border-color:var(--gold)}
.btn{width:100%;padding:14px;background:var(--gold);color:#08080F;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;cursor:pointer;letter-spacing:1px;margin-top:4px}
.btn:disabled{opacity:.5;cursor:default}
.msg{text-align:center;margin-top:12px;font-size:15px;font-weight:700;min-height:22px}
.err{color:var(--red)}.ok{color:var(--green)}
.foot{text-align:center;margin-top:20px;font-size:15px;color:var(--muted);font-weight:600}
.foot a{color:var(--gold);text-decoration:none}
</style>
</head>
<body>
<div class="logo">BULLION DEALER PRO</div>
<div class="card">
  <h2>LOG IN</h2>
  <form id="form">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@[example.com](https://example.com)" required autocomplete="email">
    <label>Password</label>
    <input type="password" id="pass" placeholder="password" required autocomplete="current-password">
    <button type="submit" class="btn" id="btn">LOG IN</button>
  </form>
  <div class="msg" id="msg"></div>
</div>
<div class="foot">No account? <a href="/register">Start free trial</a></div>
<script>
document.getElementById('form').addEventListener('submit', function(e) {
  e.preventDefault();
  var btn = document.getElementById('btn');
  var msg = document.getElementById('msg');
  var email = document.getElementById('email').value;
  var pass = document.getElementById('pass').value;
  btn.disabled = true;
  btn.textContent = 'LOGGING IN';
  msg.textContent = '';
  msg.className = 'msg';
  fetch('/api/auth/login', {
    method: 'POST',
    credentials: 'include',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email: email, password: pass})
  })
  .then(function(r) { return r.json().then(function(d) { return {ok: r.ok, data: d}; }); })
  .then(function(res) {
    if (!res.ok) {
      msg.textContent = res.data.error || 'Login failed';
      msg.className = 'msg err';
      btn.disabled = false;
      btn.textContent = 'LOG IN';
    } else {
      msg.textContent = 'Welcome back!';
      msg.className = 'msg ok';
      setTimeout(function() {
        window.location.href = res.data.plan === 'admin' ? '/admin' : '/app';
      }, 800);
    }
  })
  .catch(function(err) {
    msg.textContent = 'Connection error';
    msg.className = 'msg err';
    btn.disabled = false;
    btn.textContent = 'LOG IN';
  });
});
</script>
</body>
</html>
