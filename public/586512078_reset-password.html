<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Bullion Dealer Pro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #d4af37;
      border-radius: 10px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    h1 { color: #d4af37; font-size: 1.6rem; margin-bottom: 8px; }
    p { color: #999; font-size: 0.9rem; margin-bottom: 24px; }
    label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: #ccc; }
    input {
      width: 100%;
      padding: 12px;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-size: 1rem;
      margin-bottom: 16px;
    }
    input:focus { outline: none; border-color: #d4af37; }
    button {
      width: 100%;
      padding: 13px;
      background: #d4af37;
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #c49b2a; }
    .msg { text-align: center; margin-top: 16px; font-size: 0.9rem; }
    .msg.error { color: #e74c3c; }
    .msg.success { color: #2ecc71; }
    .back { text-align: center; margin-top: 20px; }
    .back a { color: #d4af37; text-decoration: none; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔑 Reset Password</h1>

    <!-- Forgot Password Form -->
    <div id="forgotForm">
      <p>Enter your email and we'll send you a reset link.</p>
      <label>Email Address</label>
      <input type="email" id="forgotEmail" placeholder="you@example.com" />
      <button onclick="sendReset()">Send Reset Link</button>
      <div class="msg" id="forgotMsg"></div>
    </div>

    <!-- New Password Form (shown when token in URL) -->
    <div id="resetForm" style="display:none;">
      <p>Enter your new password below.</p>
      <label>New Password</label>
      <input type="password" id="newPassword" placeholder="At least 8 characters" />
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Repeat your password" />
      <button onclick="doReset()">Set New Password</button>
      <div class="msg" id="resetMsg"></div>
    </div>

    <div class="back"><a href="/login">Back to Login</a></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (token) {
      document.getElementById('forgotForm').style.display = 'none';
      document.getElementById('resetForm').style.display = 'block';
    }

    async function sendReset() {
      const email = document.getElementById('forgotEmail').value.trim();
      const msg = document.getElementById('forgotMsg');
      if (!email) { msg.className = 'msg error'; msg.textContent = 'Please enter your email.'; return; }

      msg.className = 'msg'; msg.textContent = 'Sending...';
      try {
        const r = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        msg.className = 'msg success';
        msg.textContent = 'If that email exists, a reset link has been sent. Check your inbox!';
      } catch (e) {
        msg.className = 'msg error'; msg.textContent = 'Something went wrong. Try again.';
      }
    }

    async function doReset() {
      const password = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;
      const msg = document.getElementById('resetMsg');

      if (password.length < 8) { msg.className = 'msg error'; msg.textContent = 'Password must be at least 8 characters.'; return; }
      if (password !== confirm) { msg.className = 'msg error'; msg.textContent = 'Passwords do not match.'; return; }

      msg.className = 'msg'; msg.textContent = 'Updating...';
      try {
        const r = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });
        const data = await r.json();
        if (!r.ok) { msg.className = 'msg error'; msg.textContent = data.error || 'Reset failed.'; return; }
        msg.className = 'msg success';
        msg.textContent = 'Password updated! Redirecting to login...';
        setTimeout(() => window.location.href = '/login', 2000);
      } catch (e) {
        msg.className = 'msg error'; msg.textContent = 'Something went wrong. Try again.';
      }
    }
  </script>
</body>
</html>
