<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bullion Dealer Pro</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <h1>Bullion Dealer Pro</h1>
  <button onclick="fetchMetals()">Refresh</button>
</header>

<main>

<div class="card">
  <h2>Spot Prices</h2>
  <p id="gold">Gold: --</p>
  <p id="silver">Silver: --</p>
  <p id="platinum">Platinum: --</p>
  <p id="palladium">Palladium: --</p>
</div>

<div class="card">
  <h2>Deal Calculator</h2>
  <input type="number" id="buy" placeholder="Buy %" oninput="calc()">
  <input type="number" id="sell" placeholder="Sell %" oninput="calc()">
  <p id="spread">Spread: --</p>
</div>

</main>

<script src="app.js"></script>
</body>
</html>
