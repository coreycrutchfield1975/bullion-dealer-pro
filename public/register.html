<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Register — Bullion Dealer Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Orbitron:wght@700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#FFD700;--bg:#08080F;--bg2:#10101A;--bg3:#181828;--border:#252545;--text:#F2F2FF;--muted:#5A5A88;--green:#00FF88;--red:#FF4455}
body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.logo{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;background:linear-gradient(90deg,var(--gold),#90B8E8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px;margin-bottom:32px;text-align:center}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:36px;width:100%;max-width:420px}
h2{font-family:'Orbitron',monospace;font-size:16px;letter-spacing:2px;color:var(--gold);margin-bottom:6px;text-align:center}
.sub{text-align:center;color:var(--green);font-size:14px;font-weight:700;margin-bottom:24px;letter-spacing:1px}
label{display:block;font-size:12px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:5px}
input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:16px;margin-bottom:18px;outline:none;-webkit-appearance:none}
input:focus{border-color:var(--gold)}
.btn{width:100%;padding:14px;background:var(--gold);color:#08080F;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;cursor:pointer;letter-spacing:1px;margin-top:4px}
.btn:disabled{opacity:.5;cursor:default}
.msg{text-align:center;margin-top:12px;font-size:15px;font-weight:700;min-height:22px}
.err{color:var(--red)}.ok{color:var(--green)}
.foot{text-align:center;margin-top:20px;font-size:15px;color:var(--muted);font-weight:600}
.foot a{color:var(--gold);text-decoration:none}
.trial-badge{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.25);border-radius:8px;padding:10px 14px;margin-bottom:22px;text-align:center;font-size:14px;color:#A0A0CC;font-weight:600}
</style>
</head>
<body>
<div class="logo">⬡ BULLION DEALER PRO</div>
<div class="card">
  <h2>CREATE ACCOUNT</h2>
  <div class="sub">14-DAY FREE TRIAL · NO CARD REQUIRED</div>
  <div class="trial-badge">✓ Full access · ✓ Cancel anytime · ✓ No credit card to start</div>
  <form id="form">
    <label>Full Name</label>
    <input type="text" id="name" placeholder="John Smith" required autocomplete="name">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@[example.com](https://example.com)" required autocomplete="email">
    <label>Password</label>
    <input type="password" id="pass" placeholder="min 8 characters" required autocomplete="new-password" minlength="8">
    <button type="submit" class="btn" id="btn">START FREE TRIAL</button>
  </form>
  <div class="msg" id="msg"></div>
</div>
<div class="foot">Already have an account? <a href="/login">Log in →</a></div>
<script>
document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  btn.disabled = true; btn.textContent = 'CREATING ACCOUNT…';
  msg.textContent = ''; msg.className = 'msg';
  try {
    const r = await fetch('/api/auth/register', {
      method: 'POST', credentials: 'include',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('pass').value
      })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Registration failed');
    msg.textContent = '✓ Account created! Redirecting…'; msg.className = 'msg ok';
    setTimeout(() => { window.location.href = '/app'; }, 1000);
  } catch(err) {
    msg.textContent = [err.me](https://err.me)ssage; msg.className = 'msg err';
    btn.disabled = false; btn.textContent = 'START FREE TRIAL';
  }
});
</script>
</body>
</html>
