<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin — Bullion Dealer Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Orbitron:wght@700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#FFD700;--bg:#08080F;--bg2:#10101A;--bg3:#181828;--border:#252545;--text:#F2F2FF;--muted:#5A5A88;--green:#00FF88;--red:#FF4455;--blue:#00D4FF}
body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;min-height:100vh}
nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.logo{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;background:linear-gradient(90deg,var(--gold),#90B8E8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px}
.btn{padding:6px 16px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.5px;border:none;text-decoration:none}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-red{background:var(--red);color:#fff;border:none}
.btn-green{background:var(--green);color:#08080F;border:none}
.main{padding:24px;max-width:1200px;margin:0 auto}
h1{font-family:'Orbitron',monospace;font-size:18px;letter-spacing:2px;color:var(--gold);margin-bottom:24px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:32px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;text-align:center}
.stat .sl{font-size:11px;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:6px}
.stat .sv{font-size:32px;font-weight:800;color:var(--gold)}
.stat .ss{font-size:12px;color:var(--muted)}
.section-title{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:24px}
table{width:100%;border-collapse:collapse;font-size:14px}
th{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1.5px;color:var(--muted);text-align:left;padding:8px;border-bottom:1px solid var(--border)}
td{padding:9px 8px;border-bottom:1px solid rgba(37,37,69,.5);font-weight:600;vertical-align:middle}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.5px}
.badge-trial{background:rgba(0,212,255,.15);color:var(--blue);border:1px solid rgba(0,212,255,.3)}
.badge-active{background:rgba(0,255,136,.15);color:var(--green);border:1px solid rgba(0,255,136,.3)}
.badge-expired{background:rgba(255,68,85,.15);color:var(--red);border:1px solid rgba(255,68,85,.3)}
.badge-admin{background:rgba(255,215,0,.15);color:var(--gold);border:1px solid rgba(255,215,0,.3)}
.badge-cancelled{background:rgba(90,90,136,.15);color:var(--muted);border:1px solid rgba(90,90,136,.3)}
.search-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search-row input{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:15px;outline:none;min-width:220px}
.search-row input:focus{border-color:var(--gold)}
.search-row select{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:15px;outline:none}
.action-btn{padding:4px 12px;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;margin-right:4px}
.empty{text-align:center;padding:32px;color:var(--muted);font-size:15px;font-weight:600}
.msg{padding:10px 14px;border-radius:8px;font-size:14px;font-weight:700;margin-bottom:14px;display:none}
.msg.ok{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);color:var(--green);display:block}
.msg.err{background:rgba(255,68,85,.1);border:1px solid rgba(255,68,85,.3);color:var(--red);display:block}
</style>
</head>
<body>
<nav>
  <div class="logo">⬡ BULLION DEALER PRO · ADMIN</div>
  <div style="display:flex;gap:10px;align-items:center">
    <a href="/app" class="btn btn-outline">Dashboard</a>
    <button onclick="logout()" class="btn btn-outline">Log Out</button>
  </div>
</nav>

<div class="main">
  <h1>ADMIN PANEL</h1>
  <div id="msg" class="msg"></div>

  <div class="stats-grid">
    <div class="stat"><div class="sl">TOTAL USERS</div><div class="sv" id="stat-total">—</div></div>
    <div class="stat"><div class="sl">ACTIVE SUBS</div><div class="sv" id="stat-active" style="color:var(--green)">—</div></div>
    <div class="stat"><div class="sl">TRIALS</div><div class="sv" id="stat-trial" style="color:var(--blue)">—</div></div>
    <div class="stat"><div class="sl">EXPIRED</div><div class="sv" id="stat-expired" style="color:var(--red)">—</div></div>
    <div class="stat"><div class="sl">MRR (EST.)</div><div class="sv" id="stat-mrr" style="color:var(--gold)">—</div><div class="ss">active subs × $19</div></div>
  </div>

  <div class="panel">
    <div class="section-title">USER MANAGEMENT</div>
    <div class="search-row">
      <input type="text" id="search" placeholder="Search email or name…" oninput="filterUsers()">
      <select id="filter-plan" onchange="filterUsers()">
        <option value="">All Plans</option>
        <option value="trial">Trial</option>
        <option value="active">Active</option>
        <option value="expired">Expired</option>
        <option value="cancelled">Cancelled</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr><th>Email</th><th>Name</th><th>Plan</th><th>Joined</th><th>Trial Ends / Sub</th><th>Actions</th></tr></thead>
        <tbody id="users-tbody"><tr><td colspan="6" class="empty">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let allUsers = [];

async function checkAdmin() {
  const r = await fetch('/api/auth/me', {credentials:'include'});
  if (r.status === 401) { window.location.href='/login'; return; }
  const d = await r.json();
  if (d.plan !== 'admin') { window.location.href='/app'; }
}

async function loadUsers() {
  try {
    const r = await fetch('/api/admin/users', {credentials:'include'});
    if (r.status === 403) { window.location.href='/app'; return; }
    const d = await r.json();
    allUsers = d.users || [];
    updateStats();
    renderUsers(allUsers);
  } catch(e) { showMsg('Failed to load users: '+[e.me](https://e.me)ssage, 'err'); }
}

function updateStats() {
  $('stat-total').textContent = allUsers.length;
  const active = allUsers.filter(u=>u.plan==='active').length;
  const trial = allUsers.filter(u=>u.plan==='trial').length;
  const expired = allUsers.filter(u=>u.plan==='expired').length;
  $('stat-active').textContent = active;
  $('stat-trial').textContent = trial;
  $('stat-expired').textContent = expired;
  $('stat-mrr').textContent = '$'+(active*19).toLocaleString();
}

function filterUsers() {
  const q = $('search').value.toLowerCase();
  const plan = $('filter-plan').value;
  const filtered = allUsers.filter(u => {
    const matchQ = !q || u.email.toLowerCase().includes(q) || (u.name||'').toLowerCase().includes(q);
    const matchP = !plan || u.plan === plan;
    return matchQ && matchP;
  });
  renderUsers(filtered);
}

function renderUsers(users) {
  if (!users.length) { $('users-tbody').innerHTML='<tr><td colspan="6" class="empty">No users found</td></tr>'; return; }
  $('users-tbody').innerHTML = users.map(u => {
    const planBadge = `<span class="badge badge-${u.plan}">${u.plan.toUpperCase()}</span>`;
    const joined = u.created_at ? new Date(u.created_at).toLocaleDateString() : '—';
    const trialEnd = u.trial_ends ? new Date(u.trial_ends).toLocaleDateString() : '—';
    const actions = u.plan !== 'admin' ? `
      <button class="action-btn" style="background:rgba(0,255,136,.15);color:var(--green)" onclick="setActive('${u.id}')">Activate</button>
      <button class="action-btn" style="background:rgba(255,68,85,.15);color:var(--red)" onclick="cancelUser('${u.id}')">Cancel</button>
    ` : '<span style="color:var(--muted);font-size:12px">ADMIN</span>';
    return `<tr>
      <td>${u.email}</td>
      <td style="color:#A0A0CC">${u.name||'—'}</td>
      <td>${planBadge}</td>
      <td style="color:var(--muted)">${joined}</td>
      <td style="color:var(--muted)">${trialEnd}</td>
      <td>${actions}</td>
    </tr>`;
  }).join('');
}

async function setActive(id) {
  if (!confirm('Manually activate this user?')) return;
  const r = await fetch('/api/admin/users/'+id, {
    method:'PATCH', credentials:'include',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({plan:'active'})
  });
  if (r.ok) { showMsg('User activated!','ok'); loadUsers(); }
  else showMsg('Failed to update user','err');
}

async function cancelUser(id) {
  if (!confirm('Cancel this user\'s subscription?')) return;
  const r = await fetch('/api/admin/users/'+id, {
    method:'PATCH', credentials:'include',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({plan:'cancelled'})
  });
  if (r.ok) { showMsg('User cancelled.','ok'); loadUsers(); }
  else showMsg('Failed to update user','err');
}

function showMsg(text, type) {
  const m = $('msg');
  m.textContent = text; m.className = 'msg '+type;
  setTimeout(()=>{ m.className='msg'; m.textContent=''; }, 4000);
}

function logout() {
  fetch('/api/auth/logout',{method:'POST',credentials:'include'})
    .then(()=>window.location.href='/');
}

checkAdmin();
loadUsers();
</script>
</body>
</html>
